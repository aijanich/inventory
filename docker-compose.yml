services:
  app:
    build:
      context: .
    command: >
       sh -c "python manage.py migrate && 
              python manage.py runserver 0.0.0.0:8000"
    ports:
      - 8000:8000
    volumes:
      - ./app:/app
    environment:
      - SECRET_KEY=decsecretkey
      - DEBUG=1
      - DB_NAME=devdb
      - DB_USER=devuser
      - DB_PASS=password
    depends_on:
      - db
  db:
    image: postgres:13-alpine
    environment:
      - POSTGRES_DB=devdb
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=password
